<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ATrust Wallet</title>
    <meta name="theme-color" content="#1b1b1d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ATrust Wallet" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./assets/icon-512.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="pull-refresh" aria-hidden="true">
        <span class="pull-refresh__spinner">
          <span class="pull-refresh__bar"></span>
          <span class="pull-refresh__bar"></span>
          <span class="pull-refresh__bar"></span>
          <span class="pull-refresh__bar"></span>
          <span class="pull-refresh__bar"></span>
          <span class="pull-refresh__bar"></span>
          <span class="pull-refresh__bar"></span>
          <span class="pull-refresh__bar"></span>
        </span>
      </div>
      <span class="pull-scrollbar" aria-hidden="true"></span>
      <span class="top-mask" aria-hidden="true"></span>

      <button class="icon-button icon-button--settings" data-action="settings" aria-label="Settings">
        <img src="./settings.jpg" alt="" aria-hidden="true" />
      </button>

      <label class="searchbar">
        <svg class="searchbar__icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="10.1" cy="10.1" r="4.95" />
          <path d="M14 14 18.2 18.2" />
        </svg>
        <input id="searchInput" type="text" placeholder="Search" autocomplete="off" />
      </label>

      <button class="icon-button icon-button--scan" data-action="scan" aria-label="Scan">
        <img src="./scan.jpg" alt="" aria-hidden="true" />
      </button>

      <div class="scroll-layer" id="scrollLayer">
        <div class="wallet-row">
          <button class="wallet-pill" data-action="wallet">
            <span>Main Wallet</span>
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <path d="M7 4l6 6-6 6" />
            </svg>
          </button>

          <button class="icon-button icon-button--copy" id="copyWallet" aria-label="Copy wallet address">
            <img src="./copy.jpg" alt="" aria-hidden="true" />
          </button>
        </div>

      <section class="balance-block">
        <h1>0,00 $</h1>
        <p>0,00 $ (0.00%)</p>
      </section>

      <section class="action-grid">
        <button class="action-button" data-action="send">
          <span class="action-button__box">
            <img src="./trust_send.svg" alt="" aria-hidden="true" />
          </span>
          <span class="action-button__label">Send</span>
        </button>

        <button class="action-button" data-action="receive">
          <span class="action-button__box">
            <img src="./trust_receive.svg" alt="" aria-hidden="true" />
          </span>
          <span class="action-button__label">Receive</span>
        </button>

        <button class="action-button" data-action="swap">
          <span class="action-button__box">
            <img src="./trust_swap.svg?v=3" alt="" aria-hidden="true" />
          </span>
          <span class="action-button__label">Swap</span>
        </button>

        <button class="action-button" data-action="buy">
          <span class="action-button__box action-button__box--accent">
            <img src="./trust_plus.svg" alt="" aria-hidden="true" />
          </span>
          <span class="action-button__label">Buy</span>
        </button>
      </section>

      <button class="promo-card" data-action="promo">
        <span class="promo-slider" aria-hidden="true">
          <img src="./slider1.jpg" alt="" />
          <img src="./slider2.jpg" alt="" />
        </span>
      </button>

      <div class="pager pager--first" id="promoPager" aria-hidden="true">
        <span class="pager__dot"></span>
        <span class="pager__dot"></span>
        <span class="pager__active"></span>
      </div>

      <section class="portfolio">
        <div class="portfolio__header">
          <div class="tabs">
            <button class="tab tab--active" data-action="crypto">Crypto</button>
            <button class="tab" data-action="watchlist">Watchlist</button>
            <button class="tab" data-action="nfts">NFTs</button>
          </div>

          <div class="portfolio__tools">
            <button class="icon-button icon-button--tool" data-action="history" aria-label="History">
              <img src="./time.jpg" alt="" aria-hidden="true" />
            </button>

            <button class="icon-button icon-button--tool" data-action="filters" aria-label="Filters">
              <img src="./filters.jpg" alt="" aria-hidden="true" />
            </button>
          </div>
        </div>

        <div class="asset-list" id="assetList"></div>
      </section>

      <section class="perps">
        <button class="section-heading" data-action="perps">
          <h3>Perps</h3>
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="M7 4l6 6-6 6" />
          </svg>
        </button>

        <div class="perp-grid">
          <article class="perp-card">
            <div class="perp-card__top">
              <span class="perp-token" aria-hidden="true">
                <img class="perp-token__main" src="./coins/btc.png" alt="" />
                <img class="perp-token__badge" src="./coins/aster.png" alt="" />
              </span>
              <span class="perp-copy">
                <strong>BTC</strong>
              </span>
            </div>
            <p class="perp-card__description">Trade BTC with up to 200x leverage</p>
            <p class="perp-card__volume">$8K Vol</p>
          </article>

          <article class="perp-card">
            <div class="perp-card__top">
              <span class="perp-token" aria-hidden="true">
                <img class="perp-token__main" src="./coins/ethereum.png" alt="" />
                <img class="perp-token__badge" src="./coins/aster.png" alt="" />
              </span>
              <span class="perp-copy">
                <strong>ETH</strong>
              </span>
            </div>
            <p class="perp-card__description">Trade ETH with up to 200x leverage</p>
            <p class="perp-card__volume">$164K Vol</p>
          </article>
        </div>
      </section>
      </div>

      <nav class="bottom-nav" aria-label="Primary">
        <img class="bottom-nav__image" src="./navbar.png" alt="" aria-hidden="true" />

        <button class="nav-item nav-item--active" data-action="nav-home">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6.4 11.2 5.6-4.8 5.6 4.8" />
            <path d="M8.5 10.8v6.1h7v-6.1" />
            <path d="M10.8 16.8v-3.2h2.4v3.2" />
          </svg>
          <span>Home</span>
        </button>

        <button class="nav-item" data-action="nav-markets">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6.2 15.9 3.4-3.6 2.4 1.7 5.3-6.1" />
            <path d="M14.8 8h2.8v2.8" />
          </svg>
          <span>Markets</span>
        </button>

        <button class="nav-swap" data-action="swap" aria-label="Swap">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18.2 8.4A7.2 7.2 0 0 0 5.4 9.6" />
            <path d="M18.4 4.9v3.7h-3.7" />
            <path d="M5.8 15.6a7.2 7.2 0 0 0 12.8-1.2" />
            <path d="M5.6 19.1v-3.7h3.7" />
          </svg>
        </button>

        <button class="nav-item" data-action="nav-perps">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6.4 12c1.5-2.1 2.8-3.1 4-3.1 1.3 0 2.1.9 3.4 3.1 1.3 2.2 2.1 3.1 3.4 3.1 1.2 0 2.5-1 4-3.1" />
            <path d="M6.4 12c1.5 2.1 2.8 3.1 4 3.1 1.3 0 2.1-.9 3.4-3.1 1.3-2.2 2.1-3.1 3.4-3.1 1.2 0 2.5 1 4 3.1" />
          </svg>
          <span>Perps</span>
        </button>

        <button class="nav-item" data-action="nav-discover">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM16 8 9.5 9.5 8 16l6.5-1.5L16 8Z" />
          </svg>
          <span>Discover</span>
        </button>
      </nav>

      <div class="settings-sheet" id="settingsSheet" aria-hidden="true">
        <button class="settings-sheet__scrim" id="settingsScrim" aria-label="Close settings"></button>
        <section class="settings-sheet__panel" aria-labelledby="settingsTitle">
          <header class="settings-sheet__header">
            <h2 id="settingsTitle">Wallets</h2>
            <button class="settings-sheet__done" id="settingsDone" type="button">Done</button>
          </header>

          <div class="settings-wallets" id="settingsWallets" aria-label="Wallet profiles"></div>

          <label class="settings-field">
            <span>Wallet name</span>
            <input id="settingsWalletName" type="text" autocomplete="off" />
          </label>

          <div class="settings-section settings-section--notifications">
            <h3>Notifications</h3>
            <button class="notification-button" id="notificationButton" type="button">
              Enable iPhone notifications
            </button>
            <p class="notification-status" id="notificationStatus">
              Sends a real notification when USDT arrives.
            </p>
          </div>

          <div class="settings-section">
            <h3>Assets</h3>
            <div class="settings-assets" id="settingsAssets"></div>
          </div>

          <div class="settings-section">
            <h3>Balances</h3>
            <div class="settings-balances" id="settingsBalances"></div>
          </div>

          <div class="settings-section">
            <div class="settings-section__head">
              <h3>Receive addresses</h3>
              <button id="settingsRandomAddresses" type="button">Randomize</button>
            </div>
            <div class="settings-addresses" id="settingsAddresses"></div>
          </div>
        </section>
      </div>

      <div class="receive-sheet" id="receiveSheet" aria-hidden="true">
        <button class="receive-sheet__scrim" id="receiveScrim" aria-label="Close receive"></button>
        <section class="receive-sheet__panel" aria-labelledby="receiveTitle">
          <header class="receive-sheet__header">
            <button class="receive-sheet__close" id="receiveClose" type="button" aria-label="Close receive">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 5l14 14M19 5 5 19" />
              </svg>
            </button>
            <h2 id="receiveTitle">Receive</h2>
          </header>

          <label class="receive-search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="10.1" cy="10.1" r="5" />
              <path d="M14 14 18.2 18.2" />
            </svg>
            <input id="receiveSearch" type="text" placeholder="Search" autocomplete="off" />
          </label>

          <div class="receive-tabs" id="receiveTabs" aria-label="Network filters"></div>
          <span class="receive-tabs__edge" aria-hidden="true"></span>
          <div class="receive-list" id="receiveList"></div>
        </section>
      </div>

      <div class="filter-sheet" id="filterSheet" aria-hidden="true">
        <button class="filter-sheet__scrim" id="filterScrim" aria-label="Close filters"></button>
        <section class="filter-sheet__panel" aria-labelledby="filterTitle">
          <span class="filter-sheet__handle" aria-hidden="true"></span>
          <div class="filter-sheet__header">
            <h2 id="filterTitle">Choose coins</h2>
            <button class="filter-sheet__done" id="filterDone" type="button">Done</button>
          </div>
          <div class="filter-list" id="filterList"></div>
        </section>
      </div>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="./config.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
