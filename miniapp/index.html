<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FLASH USDT</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="mini-app" id="miniApp">
      <header class="topbar">
        <span class="topbar__spacer" aria-hidden="true"></span>

        <div class="topbar__actions">
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch theme">
            <svg class="theme-toggle__sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4.2" />
              <path d="M12 2.8v2M12 19.2v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2.8 12h2M19.2 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
            </svg>
            <svg class="theme-toggle__moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.1 14.4A7.9 7.9 0 0 1 9.6 3.9 8.6 8.6 0 1 0 20.1 14.4Z" />
            </svg>
          </button>
          <button class="settings-button" id="settingsButton" type="button" aria-label="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 8.4a3.6 3.6 0 1 1 0 7.2 3.6 3.6 0 0 1 0-7.2Z" />
              <path d="M19.4 13.5a7.7 7.7 0 0 0 0-3l2-1.5-2-3.4-2.4 1a8 8 0 0 0-2.6-1.5L14 2.5h-4l-.4 2.6A8 8 0 0 0 7 6.6l-2.4-1-2 3.4 2 1.5a7.7 7.7 0 0 0 0 3l-2 1.5 2 3.4 2.4-1a8 8 0 0 0 2.6 1.5l.4 2.6h4l.4-2.6a8 8 0 0 0 2.6-1.5l2.4 1 2-3.4-2-1.5Z" />
            </svg>
          </button>
        </div>
      </header>

      <section class="hero">
        <p class="eyebrow">Dashboard</p>
        <h1>FLASH USDT</h1>
      </section>

      <section class="flash-card">
        <div class="flash-card__coin">
          <img class="flash-card__main-icon" src="../coins/usdt.png" alt="" />
          <span class="flash-card__badge" id="selectedChainBadge">
            <img id="selectedChainIcon" src="../coins/tron.png" alt="" />
          </span>
        </div>

        <div class="flash-card__copy">
          <strong>USDT</strong>
          <b id="selectedChainTitle">TRC20</b>
          <span id="selectedChainNetwork">Tron network</span>
        </div>

        <div class="flash-card__balance">
          <strong id="balanceText">0.00 USDT</strong>
          <span id="usdText">$0.00</span>
        </div>
      </section>

      <button class="send-button" id="sendButton" type="button">
        <span>Send USDT</span>
      </button>

      <button class="history-button" id="historyButton" type="button">
        <span>History</span>
      </button>

      <section class="history-panel" id="historyPanel" hidden>
        <h2>History</h2>
        <div id="historyList"></div>
      </section>
    </main>

    <div class="settings-sheet" id="settingsSheet" aria-hidden="true">
      <button class="settings-sheet__scrim" id="settingsScrim" type="button" aria-label="Close"></button>
      <form class="settings-panel" id="settingsForm">
        <div class="settings-panel__handle"></div>
        <header>
          <h2>Mini App Settings</h2>
          <button type="button" id="settingsClose">Done</button>
        </header>

        <label>
          <span>Display name</span>
          <input id="displayNameInput" type="text" autocomplete="off" />
        </label>

        <label>
          <span>Show on front page</span>
          <div class="chain-select">
            <div class="chain-select__visual" aria-hidden="true">
              <img id="displayChainSelectIcon" src="../coins/tron.png" alt="" />
              <strong id="displayChainSelectText">USDT TRC20</strong>
              <svg viewBox="0 0 20 20">
                <path d="m6 8 4 4 4-4" />
              </svg>
            </div>
            <select id="displayChainInput">
              <option value="TRX">USDT TRC20</option>
              <option value="ETH">USDT ERC20</option>
              <option value="BNB">USDT BEP20</option>
              <option value="SOL">USDT SPL</option>
            </select>
          </div>
        </label>

        <label>
          <span>Color theme</span>
          <select id="accentInput">
            <option value="green">Old money</option>
            <option value="blue">Deep blue</option>
            <option value="minimal">Minimal black</option>
            <option value="mono">Pure monochrome</option>
            <option value="carbon">Carbon black</option>
            <option value="slate">Slate steel</option>
            <option value="emerald">Emerald</option>
            <option value="graphite">Graphite</option>
            <option value="violet">Violet</option>
            <option value="rose">Rose</option>
            <option value="amber">Amber</option>
          </select>
        </label>

        <div class="settings-chain-balances">
          <span>USDT balances</span>
          <div id="chainBalanceInputs"></div>
        </div>

        <label>
          <span>USDT price</span>
          <input id="priceInput" type="number" min="0" step="0.01" inputmode="decimal" />
        </label>

        <label>
          <span>TRC20 address</span>
          <input id="addressInput" type="text" autocomplete="off" spellcheck="false" />
        </label>

        <div class="settings-panel__theme">
          <span>Theme</span>
          <button id="themeInSettings" type="button">Switch theme</button>
        </div>
      </form>
    </div>

    <div class="send-sheet" id="sendSheet" aria-hidden="true">
      <button class="send-sheet__scrim" id="sendScrim" type="button" aria-label="Close"></button>
      <form class="send-panel" id="sendForm">
        <div class="settings-panel__handle"></div>
        <header>
          <h2>Send USDT</h2>
          <button type="button" id="sendClose">Done</button>
        </header>

        <label>
          <span>Chain</span>
          <div class="chain-select">
            <div class="chain-select__visual" aria-hidden="true">
              <img id="sendChainSelectIcon" src="../coins/tron.png" alt="" />
              <strong id="sendChainSelectText">Tron / TRC20</strong>
              <svg viewBox="0 0 20 20">
                <path d="m6 8 4 4 4-4" />
              </svg>
            </div>
            <select id="sendChain">
              <option value="TRX">Tron / TRC20</option>
              <option value="ETH">Ethereum / ERC20</option>
              <option value="BNB">BNB Smart Chain / BEP20</option>
              <option value="SOL">Solana</option>
              <option value="ARB">Arbitrum</option>
              <option value="BASE">Base</option>
            </select>
          </div>
        </label>

        <label>
          <span>Recipient address</span>
          <div class="send-address-row">
            <input id="sendAddress" type="text" autocomplete="off" spellcheck="false" placeholder="Paste wallet address" />
            <button class="send-address-row__paste" id="pasteAddress" type="button">Paste</button>
            <button class="send-address-row__scan" id="scanAddress" type="button" aria-label="Scan address">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 8V5h3M16 5h3v3M19 16v3h-3M8 19H5v-3" />
                <path d="M9.5 9.5h5v5h-5z" />
              </svg>
            </button>
          </div>
        </label>

        <label>
          <span>Amount</span>
          <div class="amount-field">
            <input id="sendAmount" type="number" min="0" step="0.000001" inputmode="decimal" placeholder="Amount" />
            <span class="amount-field__asset">USDT</span>
            <button class="amount-field__max" id="sendMax" type="button">Max</button>
          </div>
        </label>

        <button class="send-submit" id="sendSubmit" type="submit">Send</button>
        <p class="send-status" id="sendStatus"></p>
      </form>
    </div>

    <div class="toast" id="toast">Copied</div>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
